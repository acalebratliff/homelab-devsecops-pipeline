apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: hello-app
  labels:
    app: hello-app
  annotations:
    checkov.io/skip1: "CKV_K8S_14=Local build pipeline, image tag pinning not applicable"
    checkov.io/skip2: "CKV_K8S_43=Local build pipeline, image digest not applicable"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec: 
      automountServiceAccountToken: false
      imagePullSecrets: 
      - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10000
        seccompProfile: 
          type: RuntimeDefault
      containers:
      - name: hello-app
        image: ghcr.io/acalebratliff/hello-app:latest
        ports:
        - containerPort: 8080
        securityContext: 
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe: 
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe: 
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10